<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去のレポート | InvestNews Japan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">IN</div>
                <div>
                    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Invest<span>News</span>
                            Japan</a></h1>
                </div>
            </div>
        </div>
    </header>
    <main class="main-content">
        <section class="section">
            <div class="section-header">
                <div class="section-icon">📚</div>
                <h2>過去のレポートアーカイブ</h2>
            </div>
            <div id="archiveList" class="macro-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">読み込み中...</div>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-links"><a href="index.html">トップ</a><a href="disclaimer.html">免責事項</a></div>
            <div class="footer-copy">&copy; 2026 InvestNews Japan.</div>
        </div>
    </footer>
    <script>
        async function loadArchive() {
            const el = document.getElementById("archiveList");
            try {
                const resp = await fetch("data/index.json");
                if (!resp.ok) throw new Error("No index");
                const dates = await resp.json();
                if (!dates.length) { el.innerHTML = "<p>レポートはまだありません。</p>"; return; }
                el.innerHTML = `<ul style="list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">
          ${dates.map(d => `<li><a href="index.html?date=${d}" style="display:block;padding:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--gold);font-family:var(--font-mono);text-decoration:none;text-align:center;transition:all 0.2s;"
          onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">${d}</a></li>`).join("")}
        </ul>`;
            } catch (e) { el.innerHTML = "<p style='color:var(--text-muted)'>レポートはまだありません。バックエンドを実行してください。</p>"; }
        }
        document.addEventListener("DOMContentLoaded", loadArchive);
    </script>
</body>

</html>
